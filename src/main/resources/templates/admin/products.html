<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - Admin EcoSwap</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<aside class="admin-sidebar">
    <div class="admin-sidebar-header">
        <a th:href="@{/}" class="admin-logo"><span>♻️</span> Eco<span>Swap</span></a>
        <span class="admin-badge">ADMIN</span>
    </div>
    <nav class="admin-nav">
        <a th:href="@{/admin/dashboard}" class="admin-nav-item"><span class="nav-icon">📊</span> <span>Tổng quan</span></a>
        <a th:href="@{/admin/users}" class="admin-nav-item"><span class="nav-icon">👥</span> <span>Người dùng</span></a>
        <a th:href="@{/admin/categories}" class="admin-nav-item"><span class="nav-icon">📁</span> <span>Danh mục</span></a>
        <a th:href="@{/admin/products}" class="admin-nav-item active"><span class="nav-icon">📦</span> <span>Sản phẩm</span></a>
        <a th:href="@{/admin/exchanges}" class="admin-nav-item"><span class="nav-icon">🔄</span> <span>Trao đổi</span></a>
    </nav>
    <div class="admin-sidebar-footer">
        <a th:href="@{/}" class="admin-nav-item"><span class="nav-icon">🏠</span> <span>Xem website</span></a>
        <form th:action="@{/logout}" method="post" style="display: contents;">
            <button type="submit" class="admin-nav-item admin-logout"><span class="nav-icon">🚪</span> <span>Đăng xuất</span></button>
        </form>
    </div>
</aside>

<div class="admin-main">
    <header class="admin-topbar">
        <h1 class="admin-page-title">Sản phẩm</h1>
        <div class="admin-user">
            <span class="user-avatar" th:text="${#strings.substring(#authentication.name, 0, 1)}">A</span>
            <span th:text="${#authentication.name}">Admin</span>
        </div>
    </header>

    <div th:if="${param.success}" class="alert alert-success">
        <span th:text="${param.success[0]}"></span>
    </div>
    <div th:if="${param.error}" class="alert alert-danger">
        <span th:text="${param.error[0] == 'has_exchange_reference' ? 'Không thể xóa: Sản phẩm đang được tham chiếu bởi yêu cầu trao đổi!' : param.error[0]}">Lỗi</span>
    </div>

    <main class="admin-content">
        <div class="table-container">
            <div class="table-header">
                <span class="table-title">Danh sách sản phẩm (<span th:text="${totalProducts}">0</span>)</span>
                <div class="table-actions">
                    <form th:action="@{/admin/products}" method="get" class="search-form">
                        <input type="text" name="search" placeholder="Tìm sản phẩm..." th:value="${search}">
                        <button type="submit" class="btn btn-primary btn-sm">Tìm</button>
                    </form>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Ảnh</th>
                            <th>Tên sản phẩm</th>
                            <th>Giá</th>
                            <th>Chủ sở hữu</th>
                            <th>Danh mục</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td>
                                <img th:if="${product.imageUrl != null}"
                                     th:src="${product.imageUrl}" class="product-thumb">
                                <div th:if="${product.imageUrl == null}"
                                     style="width: 50px; height: 50px; background: #eee; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">📦</div>
                            </td>
                            <td>
                                <div style="font-weight: 600; max-width: 200px;" th:text="${product.title}">Tên sản phẩm</div>
                            </td>
                            <td>
                                <span style="color: var(--primary-color); font-weight: 600;"
                                      th:text="${#numbers.formatDecimal(product.price, 0, 'POINT', 0, 'POINT')} + ' đ'">0 đ</span>
                            </td>
                            <td>
                                <div class="user-cell">
                                    <div class="user-avatar-sm" th:text="${#strings.substring(product.user.username, 0, 1)}">U</div>
                                    <span th:text="${product.user.username}">username</span>
                                </div>
                            </td>
                            <td th:text="${product.category.name}">Danh mục</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${'AVAILABLE'.equals(product.status) ? 'badge-available' : ('SOLD'.equals(product.status) ? 'badge-sold' : 'badge-exchanged')}"
                                      th:text="${'AVAILABLE'.equals(product.status) ? 'Có sẵn' : ('SOLD'.equals(product.status) ? 'Đã bán' : 'Đã trao đổi')}">Trạng thái</span>
                            </td>
                            <td th:text="${#temporals.format(product.createdAt, 'dd/MM/yyyy')}">01/01/2026</td>
                            <td>
                                <a th:href="@{/product/{id}(id=${product.id})}" class="btn-sm btn-view" target="_blank">👁 Xem</a>
                                <form th:action="@{/admin/products/{id}/toggle-status(id=${product.id})}" method="post" style="display: inline;">
                                    <button type="submit" class="btn-sm btn-warning"
                                            th:text="${'AVAILABLE'.equals(product.status) ? '🔒 Ẩn' : '🔓 Hiện'}">Ẩn/Hiện</button>
                                </form>
                                <form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post" style="display: inline;"
                                      onsubmit="return confirm('Bạn chắc chắn muốn xóa sản phẩm này?')">
                                    <button type="submit" class="btn-sm btn-danger">🗑 Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="8" style="text-align: center; padding: 2rem; color: #999;">Chưa có sản phẩm nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" th:if="${totalPages > 1}">
                <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:href="@{/admin/products(page=${i}, search=${search})}"
                       th:classappend="${i == currentPage} ? 'current'"
                       th:text="${i + 1}">1</a>
                </th:block>
            </div>
        </div>
    </main>
</div>

</body>
</html>
