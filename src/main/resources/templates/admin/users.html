<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Người dùng - Admin EcoSwap</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<aside class="admin-sidebar">
    <div class="admin-sidebar-header">
        <a th:href="@{/}" class="admin-logo"><span>♻️</span> Eco<span>Swap</span></a>
        <span class="admin-badge">ADMIN</span>
    </div>
    <nav class="admin-nav">
        <a th:href="@{/admin/dashboard}" class="admin-nav-item"><span class="nav-icon">📊</span> <span>Tổng quan</span></a>
        <a th:href="@{/admin/users}" class="admin-nav-item active"><span class="nav-icon">👥</span> <span>Người dùng</span></a>
        <a th:href="@{/admin/categories}" class="admin-nav-item"><span class="nav-icon">📁</span> <span>Danh mục</span></a>
        <a th:href="@{/admin/products}" class="admin-nav-item"><span class="nav-icon">📦</span> <span>Sản phẩm</span></a>
        <a th:href="@{/admin/exchanges}" class="admin-nav-item"><span class="nav-icon">🔄</span> <span>Trao đổi</span></a>
    </nav>
    <div class="admin-sidebar-footer">
        <a th:href="@{/}" class="admin-nav-item"><span class="nav-icon">🏠</span> <span>Xem website</span></a>
        <form th:action="@{/logout}" method="post" style="display: contents;">
            <button type="submit" class="admin-nav-item admin-logout"><span class="nav-icon">🚪</span> <span>Đăng xuất</span></button>
        </form>
    </div>
</aside>

<div class="admin-main">
    <header class="admin-topbar">
        <h1 class="admin-page-title">Người dùng</h1>
        <div class="admin-user">
            <span class="user-avatar" th:text="${#strings.substring(#authentication.name, 0, 1)}">A</span>
            <span th:text="${#authentication.name}">Admin</span>
        </div>
    </header>

    <div th:if="${param.success}" class="alert alert-success" th:with="msg=${param.success[0]}">
        <span th:text="${#strings.equals(msg,'status_updated')} ? 'Cập nhật trạng thái thành công!' :
                       (#strings.equals(msg,'deleted')} ? 'Xóa người dùng thành công!' : ${msg})"></span>
    </div>
    <div th:if="${param.error}" class="alert alert-danger" th:with="msg=${param.error[0]}">
        <span th:text="${#strings.equals(msg,'not_found')} ? 'Không tìm thấy!' :
                       (#strings.equals(msg,'cannot_delete_self')} ? 'Không thể xóa tài khoản của chính mình!' :
                       (#strings.equals(msg,'cannot_disable_self')} ? 'Không thể vô hiệu hóa tài khoản của chính mình!' : ${msg}))"></span>
    </div>

    <main class="admin-content">
        <div class="table-container">
            <div class="table-header">
                <span class="table-title">Danh sách người dùng (<span th:text="${totalUsers}">0</span>)</span>
                <div class="table-actions">
                    <form th:action="@{/admin/users}" method="get" class="search-form">
                        <input type="text" name="search" placeholder="Tìm username, email, tên..." th:value="${search}">
                        <button type="submit" class="btn btn-primary btn-sm">Tìm</button>
                    </form>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Người dùng</th>
                            <th>Email</th>
                            <th>Điện thoại</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td>
                                <div class="user-cell">
                                    <div class="user-avatar-sm" th:text="${#strings.substring(user.username, 0, 1)}">U</div>
                                    <div>
                                        <div style="font-weight: 600;" th:text="${user.fullName != null ? user.fullName : user.username}">Username</div>
                                        <div style="font-size: 0.8rem; color: #999;" th:text="'@' + ${user.username}">@username</div>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${user.email}">email@example.com</td>
                            <td th:text="${user.phone != null} ? ${user.phone} : '-'">-</td>
                            <td>
                                <span class="badge" th:classappend="${'ADMIN'.equals(user.role) ? 'badge-admin' : 'badge-user'}"
                                      th:text="${'ADMIN'.equals(user.role) ? 'Admin' : 'User'}">User</span>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${user.active} ? 'badge-active' : 'badge-inactive'"
                                      th:text="${user.active} ? 'Hoạt động' : 'Bị khóa'">Hoạt động</span>
                            </td>
                            <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}">01/01/2026</td>
                            <td>
                                <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn-sm btn-view">👁 Xem</a>
                                <form th:action="@{/admin/users/{id}/toggle-status(id=${user.id})}" method="post" style="display: inline;">
                                    <button type="submit" class="btn-sm btn-warning"
                                            th:text="${user.active} ? '🔒 Khóa' : '🔓 Mở khóa'">Khóa</button>
                                </form>
                                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" style="display: inline;"
                                      onsubmit="return confirm('Bạn chắc chắn muốn xóa người dùng này?')">
                                    <button type="submit" class="btn-sm btn-danger">🗑 Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="7" style="text-align: center; padding: 2rem; color: #999;">Chưa có người dùng nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" th:if="${totalPages > 1}">
                <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:href="@{/admin/users(page=${i}, search=${search})}"
                       th:classappend="${i == currentPage} ? 'current'"
                       th:text="${i + 1}">1</a>
                </th:block>
            </div>
        </div>
    </main>
</div>

</body>
</html>
