<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng sản phẩm - EcoSwap</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <a th:href="@{/}" class="logo">
                <span>♻️</span> Eco<span>Swap</span>
            </a>

            <ul class="nav-links">
                <li><a th:href="@{/}">Trang chủ</a></li>
                <li><a th:href="@{/products}">Sản phẩm</a></li>
                <li><a th:href="@{/categories}">Danh mục</a></li>
            </ul>

            <div class="nav-actions">
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline">Đăng nhập</a>
                    <a th:href="@{/register}" class="btn btn-primary">Đăng ký</a>
                </div>

                <div sec:authorize="isAuthenticated()" class="user-menu">
                    <a th:href="@{/profile}" class="user-info">
                        <span th:if="${currentUser != null and currentUser.avatar != null and !currentUser.avatar.isEmpty()}" class="user-avatar">
                            <img th:src="${currentUser.avatar}" alt="Avatar" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                        </span>
                        <span th:unless="${currentUser != null and currentUser.avatar != null and !currentUser.avatar.isEmpty()}" class="user-avatar" th:text="${#strings.substring(#authentication.name, 0, 1)}">U</span>
                        <span class="user-name" th:text="${#authentication.name}">Username</span>
                    </a>
                    
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-outline">Đăng xuất</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>
    
    <main class="container">
        <div class="form-container">
            <h2 class="section-title">Đăng sản phẩm mới</h2>
            
            <form th:action="@{/products/create}" th:object="${product}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title">Tiêu đề *</label>
                    <input type="text" id="title" th:field="*{title}" required>
                </div>
                
                <div class="form-group">
                    <label for="category">Danh mục *</label>
                    <select id="category" th:field="*{category.id}" required>
                        <option value="">Chọn danh mục</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">Category</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="price">Giá (VNĐ) *</label>
                    <input type="number" id="price" th:field="*{price}" required min="0">
                </div>
                
                <div class="form-group">
                    <label for="condition">Tình trạng</label>
                    <select id="condition" th:field="*{condition}">
                        <option value="NEW">Mới</option>
                        <option value="LIKE_NEW">Như mới</option>
                        <option value="USED">Đã sử dụng</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="location">Địa điểm</label>
                    <input type="text" id="location" th:field="*{location}" placeholder="Ví dụ: Hà Nội, TP. HCM...">
                </div>
                
                <div class="form-group">
                    <label for="imageFile">Hình ảnh sản phẩm</label>
                    <input type="file" id="imageFile" name="imageFile" accept="image/*">
                </div>
                
                <div class="form-group">
                    <label for="description">Mô tả sản phẩm</label>
                    <textarea id="description" th:field="*{description}" rows="5" placeholder="Mô tả chi tiết về sản phẩm..."></textarea>
                </div>
                
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary">Đăng sản phẩm</button>
                    <a th:href="@{/}" class="btn btn-outline">Hủy</a>
                </div>
            </form>
        </div>
    </main>
    
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Về EcoSwap</h3>
                <p>Nền tảng mua bán và trao đổi đồ cũ uy tín, an toàn tại Việt Nam.</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 EcoSwap. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
