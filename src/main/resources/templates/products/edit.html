<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa sản phẩm - EcoSwap</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <nav class="navbar">
        <a th:href="@{/}" class="logo"><span>♻️</span> Eco<span>Swap</span></a>
        <ul class="nav-links">
            <li><a th:href="@{/}">Trang chủ</a></li>
            <li><a th:href="@{/products}">Sản phẩm</a></li>
            <li><a th:href="@{/categories}">Danh mục</a></li>
        </ul>
        <div class="nav-actions">
            <a th:href="@{/products/my}" class="btn btn-outline" sec:authorize="isAuthenticated()">Sản phẩm của tôi</a>
        </div>
    </nav>
</header>

<main class="container">
    <div class="form-container">
        <h2 class="section-title">Chỉnh sửa sản phẩm</h2>

        <form th:action="@{/products/{id}/update(id=${product.id})}" th:object="${product}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">Tiêu đề *</label>
                <input type="text" id="title" th:field="*{title}" required>
            </div>

            <div class="form-group">
                <label for="category">Danh mục *</label>
                <select id="category" th:field="*{category.id}" required>
                    <option value="">Chọn danh mục</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}">Category</option>
                </select>
            </div>

            <div class="form-group">
                <label for="price">Giá (VNĐ) *</label>
                <input type="number" id="price" th:field="*{price}" required min="0">
            </div>

            <div class="form-group">
                <label for="status">Trạng thái</label>
                <select id="status" th:field="*{status}">
                    <option value="AVAILABLE">Đang bán</option>
                    <option value="SOLD">Đã bán</option>
                </select>
                <small style="color: var(--text-light);">Sản phẩm đã trao đổi (EXCHANGED) sẽ được hệ thống tự cập nhật.</small>
            </div>

            <div class="form-group">
                <label for="condition">Tình trạng</label>
                <select id="condition" th:field="*{condition}">
                    <option value="NEW">Mới</option>
                    <option value="LIKE_NEW">Như mới</option>
                    <option value="USED">Đã sử dụng</option>
                </select>
            </div>

            <div class="form-group">
                <label for="location">Địa điểm</label>
                <input type="text" id="location" th:field="*{location}" placeholder="Ví dụ: Hà Nội, TP. HCM...">
            </div>

            <div class="form-group">
                <label>Ảnh hiện tại</label>
                <div style="display:flex; align-items:center; gap:1rem;">
                    <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" alt="Current Image"
                         style="width: 120px; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;">
                    <span th:unless="${product.imageUrl != null}" style="color: var(--text-light);">Chưa có ảnh</span>
                </div>
            </div>

            <div class="form-group">
                <label for="imageFile">Đổi ảnh (tuỳ chọn)</label>
                <input type="file" id="imageFile" name="imageFile" accept="image/*">
            </div>

            <div class="form-group">
                <label for="description">Mô tả sản phẩm</label>
                <textarea id="description" th:field="*{description}" rows="5" placeholder="Mô tả chi tiết về sản phẩm..."></textarea>
            </div>

            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                <a th:href="@{/products/my}" class="btn btn-outline">Quay lại</a>
            </div>
        </form>
    </div>
</main>

<footer>
    <div class="footer-content">
        <div class="footer-section">
            <h3>Về EcoSwap</h3>
            <p>Nền tảng mua bán và trao đổi đồ cũ uy tín.</p>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 EcoSwap. All rights reserved.</p>
    </div>
</footer>
</body>
</html>
