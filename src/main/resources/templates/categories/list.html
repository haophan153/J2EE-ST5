<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh mục - EcoSwap</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <a th:href="@{/}" class="logo">
                <span>♻️</span> Eco<span>Swap</span>
            </a>

            <ul class="nav-links">
                <li><a th:href="@{/}">Trang chủ</a></li>
                <li><a th:href="@{/products}">Sản phẩm</a></li>
                <li><a th:href="@{/categories}">Danh mục</a></li>
            </ul>

            <div class="nav-actions">
                <form th:action="@{/search}" method="get" class="search-form" sec:authorize="isAuthenticated()">
                    <input type="text" name="keyword" placeholder="Tìm kiếm..." class="search-input">
                    <button type="submit" class="btn btn-primary">Tìm</button>
                </form>

                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline">Đăng nhập</a>
                    <a th:href="@{/register}" class="btn btn-primary">Đăng ký</a>
                </div>

                <div sec:authorize="isAuthenticated()" class="user-menu">
                    <a th:href="@{/profile}" class="user-info">
                        <span th:if="${currentUser != null and currentUser.avatar != null and !currentUser.avatar.isEmpty()}" class="user-avatar">
                            <img th:src="${currentUser.avatar}" alt="Avatar" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                        </span>
                        <span th:unless="${currentUser != null and currentUser.avatar != null and !currentUser.avatar.isEmpty()}" class="user-avatar" th:text="${#strings.substring(#authentication.name, 0, 1)}">U</span>
                        <span class="user-name" th:text="${#authentication.name}">Username</span>
                    </a>
                    
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-outline">Đăng xuất</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>
    
    <main class="container">
        <h2 class="section-title">Danh mục sản phẩm</h2>
        
        <div class="categories-grid">
            <a th:each="category : ${categories}" 
               th:href="@{/category/{id}(id=${category.id})}" 
               class="category-card">
                <h3 th:text="${category.name}">Category Name</h3>
                <p th:text="${category.description}">Description</p>
            </a>
        </div>
    </main>
    
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Về EcoSwap</h3>
                <p>Nền tảng mua bán và trao đổi đồ cũ uy tín, an toàn tại Việt Nam.</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 EcoSwap. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
